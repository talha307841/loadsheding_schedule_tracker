name: power_alert_pakistan
description: PowerAlert Pakistan, a WAPDA load shedding tracker for Pakistan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.0
  timezone: ^0.10.1
  flutter_local_notifications: ^18.0.1
  google_mobile_ads: ^5.2.0
  package_info_plus: ^8.1.2
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
